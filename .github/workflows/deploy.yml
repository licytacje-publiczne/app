name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "shared/**"
      - "data/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy data to dist
        run: |
          mkdir -p frontend/dist/data
          if [ -f data/auctions.json ]; then
            cp data/auctions.json frontend/dist/data/
          else
            echo '{"auctions":[],"scrapedAt":"","errors":[]}' > frontend/dist/data/auctions.json
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
